name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'crates/engraver-core/**'
      - 'Cargo.lock'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        run: cargo bench -p engraver-core --features checksum

      - name: Convert Criterion output to benchmark format
        run: |
          # Criterion 0.8 doesn't support --output-format bencher.
          # Convert Criterion's JSON estimates to customBiggerIsBetter format.
          python3 -c "
          import json, glob, os

          results = []
          for est_file in glob.glob('target/criterion/**/new/estimates.json', recursive=True):
              # Extract benchmark name from path: target/criterion/<group>/<name>/new/estimates.json
              parts = est_file.split(os.sep)
              criterion_idx = parts.index('criterion')
              # Name parts are between 'criterion' and 'new'
              new_idx = parts.index('new')
              name = '/'.join(parts[criterion_idx + 1:new_idx])

              with open(est_file) as f:
                  estimates = json.load(f)

              # mean.point_estimate is in nanoseconds
              mean_ns = estimates['mean']['point_estimate']

              # Look for throughput info in benchmark.json
              bench_json = os.path.join(os.path.dirname(os.path.dirname(est_file)), 'benchmark.json')
              if os.path.exists(bench_json):
                  with open(bench_json) as f:
                      bench = json.load(f)
                  throughput = bench.get('throughput')
                  if throughput and 'Bytes' in throughput:
                      bytes_count = throughput['Bytes']
                      # Calculate bytes/sec: bytes / (mean_ns / 1e9)
                      bytes_per_sec = bytes_count / (mean_ns / 1e9)
                      results.append({
                          'name': name,
                          'unit': 'bytes/sec',
                          'value': round(bytes_per_sec, 2)
                      })
                      continue

              # Fallback: report as iterations/sec (bigger is better)
              iters_per_sec = 1e9 / mean_ns
              results.append({
                  'name': name,
                  'unit': 'iter/sec',
                  'value': round(iters_per_sec, 2)
              })

          with open('benchmark-results.json', 'w') as f:
              json.dump(results, f, indent=2)

          print(f'Converted {len(results)} benchmark results')
          for r in results:
              print(f\"  {r['name']}: {r['value']} {r['unit']}\")
          "

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: benchmark-results.json
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '110%'
          fail-on-alert: false
          comment-on-alert: true
