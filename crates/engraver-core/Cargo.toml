[package]
name = "engraver-core"
version = "0.1.0"
edition = "2021"
authors = ["Engraver Contributors"]
license = "MIT"
description = "Core library for Engraver disk imaging tool"
repository = "https://github.com/yourusername/engraver"
keywords = ["disk", "imaging", "iso", "usb", "flash"]
categories = ["command-line-utilities", "filesystem"]

[dependencies]
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
